services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fullfocus
      POSTGRES_USER: fullfocus
      POSTGRES_PASSWORD: fullfocus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fullfocus -d fullfocus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fullfocus:fullfocus@postgres:5432/fullfocus?schema=public
      REDIS_URL: redis://redis:6379
      MEDIA_ROOT: /app/media
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - server
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
      - admin
    ports:
      - "80:80"

volumes:
  postgres_data:
  media_data:
